theme:
  name: material
  logo: assets/brand/scienceclaw.png
  favicon: assets/brand/scienceclaw.png
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
