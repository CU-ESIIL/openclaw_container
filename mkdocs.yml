site_name: "OpenClaw Local Docker"
site_description: "Run OpenClaw locally in Docker with optional ChatGPT/Codex OAuth."

nav:
  - Home: index.md
  - Alpha Baseline: alpha.md
  - Scientific Working Group: working-group.md
  - Operations: operations.md
  - Security: security.md
  - Model/Auth Options: model-options.md
  - Setup Guide: setup.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
